# ===================================================================
# Spring Boot configuration.
#
# This configuration is used for unit/integration tests.
# ===================================================================

spring:
  application:
    name: pGestion360

  # ### INICIO CONFIGURACION BASE DE DATOS ###

  # 1. Configuración Reactiva (R2DBC)
  r2dbc:
    # OJO: Aquí se agrega ;MODE=PostgreSQL dentro de options
    url: r2dbc:h2:mem:///pGestion360?options=DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    pool:
      enabled: true
      initial-size: 5
      max-size: 20

  # 2. Configuración Clásica (JDBC)
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    # OJO: Aquí también se agrega ;MODE=PostgreSQL
    url: jdbc:h2:mem:pGestion360;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # 3. Liquibase
  liquibase:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:pGestion360;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    user: sa
    password:
    contexts: test
  # ### FIN CONFIGURACION BASE DE DATOS ###

  jackson:
    serialization:
      write-durations-as-timestamps: false
  mail:
    host: localhost
  main:
    allow-bean-definition-overriding: true
  messages:
    basename: i18n/messages
  security:
    oauth2:
      resourceserver:
        jwt:
          authority-prefix: ''
          authorities-claim-name: auth
  task:
    execution:
      thread-name-prefix: p-gestion-360-task-
      pool:
        core-size: 1
        max-size: 50
        queue-capacity: 10000
    scheduling:
      thread-name-prefix: p-gestion-360-scheduling-
      pool:
        size: 20
  thymeleaf:
    mode: HTML

server:
  port: 10344
  address: localhost

# ===================================================================
# JHipster specific properties
# ===================================================================
jhipster:
  clientApp:
    name: 'pGestion360App'
  mail:
    from: pGestion360@localhost.com
    base-url: http://127.0.0.1:8080
  logging:
    # To test json console appender
    use-json-format: false
    logstash:
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512
  security:
    authentication:
      jwt:
        # This token must be encoded using Base64
        base64-secret: Njk1MjNhYjU1ZDYzY2E3MWU5Mzg0YjBjYmExMmI2OTU0ZDQ3MDAxNjMwMWZkMzUyNWViNDI2ZGQ3ODE2OTc5OThiOTkwYzk3MjRmZGM2MTE2N2UzNjNjMDc3NzFkYzQwMzU3YmY3OGM0YTE5NGRkYWQ3ZjQ4OTM2MzE5YjI0ODQ=
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 86400

# ===================================================================
# Application specific properties
# ===================================================================

management:
  health:
    mail:
      enabled: false
