<!doctype html>
<html class="no-js" lang="es" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>pGestion360</title>
    <meta name="description" content="pGestion360 Management System" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#2c3e50" />
    <base href="/" />
    <link rel="icon" href="favicon.ico" />
    <link rel="manifest" href="manifest.webapp" />

    <link rel="stylesheet" href="content/css/loading.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css" />

    <style>
      body {
        background-color: #f9f9f9 !important;
        font-family:
          'Lato',
          -apple-system,
          sans-serif !important;
        color: #2c3e50 !important;
      }

      .jh-card,
      .card {
        border: 1px solid #ecf0f1 !important;
        border-radius: 8px !important;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05) !important;
        background-color: #ffffff !important;
        padding: 1.5rem !important;
        margin-bottom: 1.5rem !important;
      }

      .form-control,
      .form-select {
        border: 2px solid #dce4ec !important;
        border-radius: 4px !important;
        transition: border-color 0.2s;
      }

      .form-control:focus,
      .form-select:focus {
        border-color: #3498db !important;
        box-shadow: none !important;
      }

      .table {
        margin-top: 1rem;
        background-color: #ffffff !important;
      }

      .table thead th {
        background-color: #2c3e50 !important;
        color: #ffffff !important;
        border: none !important;
        padding: 12px !important;
      }

      a,
      .alert-link,
      [routerLink],
      .nav-link {
        color: #3498db !important;
        text-decoration: none !important;
        font-weight: 600 !important;
      }

      a:hover,
      .nav-link:hover {
        color: #2980b9 !important;
        text-decoration: underline !important;
      }

      .text-muted,
      .info,
      jhi-item-count,
      .jh-item-count-text {
        color: #7b8a8b !important;
      }

      .btn-primary {
        background-color: #2c3e50 !important;
        border-color: #2c3e50 !important;
      }

      .btn-primary:hover {
        background-color: #1a252f !important;
      }
    </style>
  </head>
  <body>
    <jhi-app>
      <div class="app-loading">
        <div class="lds-pacman">
          <div>
            <div></div>
            <div></div>
            <div></div>
          </div>
          <div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>
    </jhi-app>
    <noscript>
      <h1>JavaScript is required to run this application.</h1>
    </noscript>
    <script type="text/javascript">
      window.onload = function () {
        setTimeout(showError, 4000);
      };
      function showError() {
        const errorElm = document.getElementById('jhipster-error');
        if (errorElm?.style) {
          errorElm.style.display = 'block';
        }
      }
    </script>
  </body>
</html>
